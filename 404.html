<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Page not found — Jago Alcock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap">
  <style>html,body{margin:0;padding:0;}body{font-family:'Inter',-apple-system,system-ui,sans-serif;}</style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="content.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel">
    function NotFound() {
      const { t, tweaks, tweakOpen, setTweak, viewerMode, toggleMode } = usePageShell();
      const headFam = tweaks.headlineFont === 'sans' ? t.sans : t.serif;
      return (
        <SiteShell t={t}>
          <GlobalStyles />
          <Nav t={t} mode={viewerMode} onToggleMode={toggleMode} active="" />
          <section className="ja-page-pad" style={{ paddingTop: 120, paddingBottom: 160, textAlign: 'center' }}>
            <div style={{ fontFamily: t.mono, fontSize: 11, color: t.accent, letterSpacing: 2, marginBottom: 24 }}>
              404
            </div>
            <h1 style={{ fontFamily: headFam, fontSize: 'clamp(40px, 6vw, 72px)', fontWeight: 400,
                         color: t.text, margin: '0 0 24px', letterSpacing: -0.03 }}>
              Page not found.
            </h1>
            <p style={{ fontFamily: t.sans, fontSize: 16, color: t.dim, maxWidth: 480, margin: '0 auto 48px', lineHeight: 1.6 }}>
              The page you were looking for doesn't exist or has moved.
            </p>
            <a href="index.html" style={{
              background: t.accent, color: '#0f0f10', textDecoration: 'none',
              padding: '14px 32px', fontSize: 13, letterSpacing: 0.5,
              fontFamily: t.sans, fontWeight: 500,
              display: 'inline-flex', alignItems: 'center', gap: 10,
            }}>
              Go to portfolio <span style={{ fontSize: 16 }}>→</span>
            </a>
          </section>
          <Footer t={t} headlineFont={tweaks.headlineFont} variant="minimal" />
          <TweaksPanel open={tweakOpen} tweaks={tweaks} setTweak={setTweak} t={t} />
        </SiteShell>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<NotFound />);
  </script>
</body>
</html>
